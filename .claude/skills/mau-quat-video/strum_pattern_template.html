<style>
  * { box-sizing: border-box; }
  :root {
    --bg: #ffffff;
    --panel: #f4f4f5;
    --line: #e4e4e7;
    --accent: #4f46e5;      /* tím indigo — accent */
    --accent-press: #4338ca;
    --text: #18181b;
    --muted: #71717a;
  }
  .app {
    position: fixed; inset: 0; background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    display: flex; flex-direction: column; overflow: hidden; user-select: none; -webkit-user-select: none;
  }
  .top { display: flex; align-items: baseline; gap: 14px; padding: 16px 26px 6px; flex-wrap: wrap; }
  .top .name { font-size: clamp(16px, 2.4vw, 25px); font-weight: 800; letter-spacing: -.01em; }
  .top .meter { font-size: clamp(13px, 1.5vw, 17px); font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
  .top .bpm { margin-left: auto; font-size: clamp(11px,1.3vw,13px); color: var(--muted); letter-spacing: .1em; text-transform: uppercase; font-weight: 700; }
  .top .bpm b { color: var(--text); font-size: 1.55em; font-variant-numeric: tabular-nums; letter-spacing: 0; }

  .stage { flex: 1; position: relative; min-height: 0; }
  canvas { display: block; width: 100%; height: 100%; }
  .recdot { position: absolute; top: 14px; left: 18px; display: none; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; color: #dc2626; background: rgba(255,255,255,.9); padding: 5px 11px; border-radius: 20px; box-shadow: 0 1px 6px rgba(0,0,0,.12); }
  .recdot.show { display: flex; }
  .recdot i { width: 10px; height: 10px; border-radius: 50%; background: #dc2626; animation: bl 1s infinite; }
  @keyframes bl { 50% { opacity: .25; } }

  .controls { display: flex; align-items: center; gap: 11px; flex-wrap: wrap; padding: 13px 26px; border-top: 1px solid var(--line); background: var(--panel); }
  button, select { font-family: inherit; font-size: 14px; font-weight: 700; color: var(--text); background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 9px 14px; cursor: pointer; transition: background .15s, border-color .15s, color .15s; }
  button:hover, select:hover { border-color: var(--accent); }
  button:focus-visible, select:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button:disabled { opacity: .5; cursor: default; }
  .play { background: var(--accent); color: #fff; border-color: var(--accent); min-width: 112px; font-size: 15px; }
  .play:hover { background: var(--accent-press); }
  .save { background: #fff; color: var(--accent); border-color: var(--accent); }
  .save:hover { background: #eef2ff; }
  .toggle.act { background: var(--accent); color: #fff; border-color: var(--accent); }
  .bpmwrap input { width: clamp(110px, 15vw, 210px); accent-color: var(--accent); }
  .spacer { flex: 1; }
  .hint { color: var(--muted); font-size: 12px; padding: 0 26px 14px; background: var(--panel); }

  .app.rec .top .bpm, .app.rec .controls, .app.rec .hint { display: none; }
  .app.rec .top { padding-top: 22px; }
  .exitrec { position: fixed; top: 12px; right: 12px; z-index: 20; display: none; opacity: .3; }
  .app.rec .exitrec { display: block; }
  .exitrec:hover { opacity: 1; }
</style>

<div class="app" id="app">
  <div class="top">
    <div class="name" id="pname">Ballad — chùm 2</div>
    <div class="meter" id="pmeter">4/4</div>
    <div class="bpm">Nhịp độ <b id="bpmv">72</b></div>
  </div>

  <div class="stage" id="stage">
    <canvas id="cv"></canvas>
    <div class="recdot" id="recdot"><i></i><span id="reclbl">Đang lưu… nhịp 1/16</span></div>
  </div>

  <div class="controls">
    <button class="play" id="play">▶ Chạy</button>
    <div class="bpmwrap"><input type="range" id="bpm" min="40" max="140" value="72" aria-label="Nhịp độ (BPM)"></div>
    <select id="preset" aria-label="Chọn mẫu quạt"></select>
    <button class="toggle act" id="tSound">🔊 Gõ nhịp</button>
    <button class="toggle act" id="tCount">Đếm vào</button>
    <button class="save" id="save">⬇ Lưu video 16 nhịp</button>
    <div class="spacer"></div>
    <button id="tBg">Nền xanh</button>
    <button id="tRec">🎬 Chế độ quay</button>
  </div>
  <div class="hint">Kích thước mũi tên = độ mạnh phách (1 mạnh · 3 vừa · 2,4 nhẹ · các "và" siêu nhỏ). <b>Lưu video 16 nhịp</b> xuất file .webm nền trắng (hoặc <b>Nền xanh</b> để chroma key) chèn vào video. <b>Space</b> chạy/dừng.</div>
  <button class="exitrec" id="exitRec">✕ Thoát chế độ quay</button>
</div>

<script>
(function () {
  // str = độ mạnh phách → kích thước mũi tên: 3 mạnh(to&dài nhất) · 2 vừa · 1 nhẹ · 0 siêu nhỏ
  var PATTERNS = [
    { id:'chum2', name:'Ballad — chùm 2', meter:'4/4', bpb:4, bpm:72, cells:[
      {s:'↓',str:3,c:'1',d:.5},{s:'↑',str:0,c:'&',d:.5},{s:'↓',str:1,c:'2',d:.5},{s:'↑',str:0,c:'&',d:.5},
      {s:'↓',str:2,c:'3',d:.5},{s:'↑',str:0,c:'&',d:.5},{s:'↓',str:1,c:'4',d:.5},{s:'↑',str:0,c:'&',d:.5} ]},
    { id:'den', name:'Nốt đen cơ bản', meter:'4/4', bpb:4, bpm:80, cells:[
      {s:'↓',str:3,c:'1',d:1},{s:'↓',str:1,c:'2',d:1},{s:'↓',str:2,c:'3',d:1},{s:'↓',str:1,c:'4',d:1} ]},
    { id:'valse', name:'Valse — nốt đen', meter:'3/4', bpb:3, bpm:100, cells:[
      {s:'↓',str:3,c:'1',d:1},{s:'↑',str:1,c:'2',d:1},{s:'↑',str:1,c:'3',d:1} ]},
    { id:'valse2', name:'Valse — chùm 2', meter:'3/4', bpb:3, bpm:104, cells:[
      {s:'↓',str:3,c:'1',d:.5},{s:'↑',str:0,c:'&',d:.5},{s:'↓',str:1,c:'2',d:.5},{s:'↑',str:0,c:'&',d:.5},{s:'↓',str:1,c:'3',d:.5},{s:'↑',str:0,c:'&',d:.5} ]},
    { id:'slow', name:'Slowrock — chùm 3', meter:'4/4', bpb:4, bpm:64, cells:[
      {s:'↓',str:3,c:'1',d:1/3},{s:'↑',str:0,c:'·',d:1/3},{s:'↓',str:0,c:'·',d:1/3},
      {s:'↓',str:1,c:'2',d:1/3},{s:'↑',str:0,c:'·',d:1/3},{s:'↓',str:0,c:'·',d:1/3},
      {s:'↓',str:2,c:'3',d:1/3},{s:'↑',str:0,c:'·',d:1/3},{s:'↓',str:0,c:'·',d:1/3},
      {s:'↓',str:1,c:'4',d:1/3},{s:'↑',str:0,c:'·',d:1/3},{s:'↓',str:0,c:'·',d:1/3} ]},
    { id:'bolero', name:'Bolero — đơn·kép·kép', meter:'4/4', bpb:4, bpm:72, cells:[
      {s:'↓',str:3,c:'Bùm',d:.5},{s:'↑',str:0,c:'chát',d:.25},{s:'↑',str:0,c:'chát',d:.25},
      {s:'↓',str:1,c:'Bùm',d:.5},{s:'↑',str:0,c:'chát',d:.25},{s:'↑',str:0,c:'chát',d:.25},
      {s:'↓',str:2,c:'Bùm',d:.5},{s:'↑',str:0,c:'chát',d:.25},{s:'↑',str:0,c:'chát',d:.25},
      {s:'↓',str:1,c:'Bùm',d:.5},{s:'↑',str:0,c:'chát',d:.25},{s:'↑',str:0,c:'chát',d:.25} ]}
  ];

  var app=document.getElementById('app'), stage=document.getElementById('stage'), cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  var playBtn=document.getElementById('play'), bpmR=document.getElementById('bpm'), bpmv=document.getElementById('bpmv');
  var presetSel=document.getElementById('preset'), pname=document.getElementById('pname'), pmeter=document.getElementById('pmeter');
  var tSound=document.getElementById('tSound'), tCount=document.getElementById('tCount'), saveBtn=document.getElementById('save');
  var tBg=document.getElementById('tBg'), tRec=document.getElementById('tRec'), exitRec=document.getElementById('exitRec');
  var recdot=document.getElementById('recdot'), reclbl=document.getElementById('reclbl');

  var cur=PATTERNS[0], bpm=72, playing=false, sound=true, doCount=true, greenOn=false;
  var starts=[], t0=0, raf=0, lastClick=-1, ciLen=0, ciActive=false, W=0, H=0, dpr=1;
  var recording=false, recorder=null, recStopTO=0;
  var SCALE={3:1, 2:0.66, 1:0.46, 0:0.19};

  PATTERNS.forEach(function(p,i){ var o=document.createElement('option'); o.value=i; o.textContent=p.name; presetSel.appendChild(o); });

  function resize(){
    var r=stage.getBoundingClientRect(); dpr=Math.min(window.devicePixelRatio||1, 2);
    W=r.width; H=r.height; cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0); if(!playing) draw(0,-1,null);
  }
  window.addEventListener('resize', resize);

  function computeStarts(){ starts=[]; var cum=0; cur.cells.forEach(function(c){ starts.push(cum); cum+=c.d; }); starts.push(cum); }
  function activeIndex(pos){ for(var i=0;i<cur.cells.length;i++){ if(pos>=starts[i]-1e-6 && pos<starts[i+1]-1e-6) return i; } return cur.cells.length-1; }

  function drawArrow(x, cy, dir, L, color, glow){
    var half=L/2, headW=L*0.26, headLen=L*0.34, shaftW=Math.max(2, L*0.12);
    var tipY = dir==='down'? cy+half : cy-half, tailY = dir==='down'? cy-half : cy+half;
    var neckY = dir==='down'? tipY-headLen : tipY+headLen;
    ctx.save();
    if(glow){ ctx.shadowColor=color; ctx.shadowBlur=16; }
    ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=shaftW; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x,tailY); ctx.lineTo(x,neckY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,tipY); ctx.lineTo(x-headW,neckY); ctx.lineTo(x+headW,neckY); ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  function draw(pos, activeIdx, ci){
    var w=W,h=H;
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = greenOn? '#00b140' : '#ffffff'; ctx.fillRect(0,0,w,h);
    var padX=Math.max(30, w*0.07), innerW=w-2*padX;
    var cy=h*0.40, countY=h*0.72, barTop=h*0.13, barBot=h*0.60;
    var xAt=function(b){ return padX+(b/cur.bpb)*innerW; };
    // barlines
    ctx.strokeStyle = greenOn?'#29a84c':'#e4e4e7'; ctx.lineWidth=1;
    for(var b=1;b<cur.bpb;b++){ var xb=xAt(b); ctx.beginPath(); ctx.moveTo(xb,barTop); ctx.lineTo(xb,barBot); ctx.stroke(); }
    ctx.lineWidth=2.5; ctx.strokeStyle=greenOn?'#177a37':'#a1a1aa';
    [0,cur.bpb].forEach(function(b){ var xe=xAt(b); ctx.beginPath(); ctx.moveTo(xe,barTop-6); ctx.lineTo(xe,barBot+6); ctx.stroke(); });
    // sweep
    if(playing && ci==null){ var xs=xAt(pos); ctx.strokeStyle='rgba(79,70,229,.45)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(xs,barTop-4); ctx.lineTo(xs,barBot+4); ctx.stroke(); }
    // arrows + counts
    var maxL=h*0.46;
    cur.cells.forEach(function(cell,i){
      var cx=xAt((starts[i]+starts[i+1])/2), on=(i===activeIdx && ci==null), col=on?'#dc2626':'#1a1a1a';
      drawArrow(cx, cy, cell.s==='↓'?'down':'up', maxL*SCALE[cell.str], col, on);
      ctx.fillStyle=on?'#dc2626':(greenOn?'#0a5a24':'#71717a');
      ctx.font=(cell.str===0?'600 ':'700 ')+Math.round(cell.str===0?h*0.05:h*0.064)+'px system-ui,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(cell.c, cx, countY);
    });
    // count-in overlay
    if(ci!=null){ ctx.fillStyle='rgba(255,255,255,.62)'; ctx.fillRect(0,0,w,h);
      ctx.fillStyle='#4f46e5'; ctx.font='800 '+Math.round(h*0.4)+'px system-ui,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(ci, w/2, h/2); }
  }

  var actx=null;
  function click(accent){ if(!sound||recording) return;
    try{ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)();
      var t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
      o.type='square'; o.frequency.value=accent?2000:1300;
      g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(accent?.3:.16,t+.002); g.gain.exponentialRampToValueAtTime(.0001,t+.05);
      o.connect(g); g.connect(actx.destination); o.start(t); o.stop(t+.06);
    }catch(e){}
  }

  function frame(now){
    if(!playing) return;
    var beatMs=60000/bpm, eb=(now-t0)/beatMs;
    if(ciActive && eb<ciLen){ var n=Math.floor(eb); if(n!==lastClick){lastClick=n;click(n===0);} draw(0,-1,cur.bpb-n); raf=requestAnimationFrame(frame); return; }
    var loopBeats=eb-(ciActive?ciLen:0), pos=((loopBeats%cur.bpb)+cur.bpb)%cur.bpb;
    if(recording){ var bar=Math.min(16, Math.floor(loopBeats/cur.bpb)+1); reclbl.textContent='Đang lưu… nhịp '+bar+'/16'; }
    var wb=Math.floor(loopBeats); if(wb!==lastClick){ lastClick=wb; click(pos<0.5); }
    draw(pos, activeIndex(pos), null);
    raf=requestAnimationFrame(frame);
  }
  function play(rec){ playing=true; app.classList.add('playing'); playBtn.textContent='⏸ Dừng';
    ciActive=(doCount && !rec); ciLen=ciActive?cur.bpb:0; lastClick=-1;
    if(actx && actx.state==='suspended') actx.resume(); t0=performance.now(); raf=requestAnimationFrame(frame); }
  function stop(){ playing=false; app.classList.remove('playing'); playBtn.textContent='▶ Chạy'; cancelAnimationFrame(raf); draw(0,-1,null); }
  function toggle(){ playing?stop():play(false); }

  function loadPattern(p){ cur=p; bpm=p.bpm; bpmR.value=bpm; bpmv.textContent=bpm; pname.textContent=p.name; pmeter.textContent=p.meter; computeStarts(); stop(); }

  // ── Lưu video 16 nhịp ──
  function saveVideo(){
    if(recording) return;
    if(!('MediaRecorder' in window) || !cv.captureStream){ alert('Trình duyệt không hỗ trợ lưu video. Hãy dùng Chrome mới nhất.'); return; }
    var stream=cv.captureStream(30);
    var mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':(MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?'video/webm;codecs=vp8':'video/webm');
    var chunks=[]; try{ recorder=new MediaRecorder(stream,{mimeType:mime, videoBitsPerSecond:8000000}); }catch(e){ alert('Không tạo được bộ ghi video: '+e.message); return; }
    recorder.ondataavailable=function(e){ if(e.data && e.data.size) chunks.push(e.data); };
    recorder.onstop=function(){
      var blob=new Blob(chunks,{type:'video/webm'}), url=URL.createObjectURL(blob);
      var a=document.createElement('a'); a.href=url; a.download='mauquat-'+cur.id+'-16nhip.webm'; document.body.appendChild(a); a.click(); a.remove();
      setTimeout(function(){ URL.revokeObjectURL(url); },1000);
      recording=false; recdot.classList.remove('show'); saveBtn.disabled=false; saveBtn.textContent='⬇ Lưu video 16 nhịp'; stop();
    };
    stop(); recording=true; saveBtn.disabled=true; saveBtn.textContent='⏺ Đang lưu…'; recdot.classList.add('show'); reclbl.textContent='Đang lưu… nhịp 1/16';
    play(true); recorder.start();
    var durMs = 16*cur.bpb*(60000/bpm);
    recStopTO=setTimeout(function(){ if(recorder && recorder.state!=='inactive') recorder.stop(); }, durMs+150);
  }

  playBtn.addEventListener('click', toggle);
  bpmR.addEventListener('input', function(){ bpm=+bpmR.value; bpmv.textContent=bpm; });
  presetSel.addEventListener('change', function(){ loadPattern(PATTERNS[+presetSel.value]); presetSel.blur(); });
  tSound.addEventListener('click', function(){ sound=!sound; tSound.classList.toggle('act',sound); });
  tCount.addEventListener('click', function(){ doCount=!doCount; tCount.classList.toggle('act',doCount); });
  tBg.addEventListener('click', function(){ greenOn=!greenOn; tBg.textContent=greenOn?'Nền trắng':'Nền xanh'; if(!playing) draw(0,-1,null); });
  saveBtn.addEventListener('click', saveVideo);
  tRec.addEventListener('click', function(){ app.classList.add('rec'); setTimeout(resize,50); });
  exitRec.addEventListener('click', function(){ app.classList.remove('rec'); setTimeout(resize,50); });
  document.addEventListener('keydown', function(e){ if(e.code==='Space'){ e.preventDefault(); toggle(); } if(e.key==='Escape'){ app.classList.remove('rec'); setTimeout(resize,50); } });

  computeStarts(); loadPattern(PATTERNS[0]); resize();
})();
</script>
